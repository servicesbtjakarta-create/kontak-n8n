                return;
            }
            locationStatus.textContent = "⏳ Mengambil lokasi...";

                    const longitude = position.coords.longitude;
                    const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;

selfieInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        cameraStatus.textContent = "⏳ Memproses & mengompres foto...";
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                
                // 1. Tentukan maksimal resolusi (bisa disesuaikan)
                const MAX_WIDTH = 800;
                const MAX_HEIGHT = 800;
                let width = img.width;
                let height = img.height;
                
                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                
                // Gambar ulang image ke canvas dengan resolusi baru
                ctx.drawImage(img, 0, 0, width, height);
                
                // 2. Lakukan kompresi kualitas (mulai dari 0.7 atau 70%)
                let quality = 0.7;
                let compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                
                // 3. Loop mengecilkan kualitas jika file masih di atas 200 KB (~270000 karakter Base64)
                // (Ukuran karakter Base64 sekitar 33% lebih besar dari binary asli)
                while (compressedBase64.length * 0.75 > 200 * 1024 && quality > 0.1) {
                    quality -= 0.1;
                    compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                }
                
                // Simpan hasil kompresi ke input hidden dan tampilkan preview
                fotoBase64Input.value = compressedBase64;
                photoPreview.src = compressedBase64;
                photoPreview.style.display = "block";
                
                // Hitung estimasi ukuran akhir untuk log/status
                const finalSizeKb = Math.round((compressedBase64.length * 0.75) / 1024);
                cameraStatus.textContent = `✅ Foto berhasil dikunci!`;
            }
        }
        reader.readAsDataURL(file);
    }
