<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Digital SERA BIT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .card { background: #ffffff; width: 100%; max-width: 420px; padding: 30px 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); }

        /* Welcome Screen Styles */
        #welcomeScreen { text-align: center; }
        
        /* CSS untuk Logo Halo Suzuki */
        .welcome-logo-img {
            max-width: 300px; /* Sesuaikan ukuran logo */
            height: auto;
            margin-bottom: 15px; /* Jarak antara logo dan teks */
        }
        
        /* Menghapus ikon emoji lama */
        .welcome-emoji { font-size: 50px; margin-bottom: 20px; display: none; } 
        
        #welcomeScreen h2 { margin-bottom: 10px; }
        .btn-start { background-color: #FF6C37; color: white; padding: 15px; border-radius: 10px; cursor: pointer; border: none; width: 100%; font-weight: 600; margin-top: 20px; }
        
        /* Hidden Class */
        .hidden { display: none; }

        /* Form & Button Styles */
        h2 { color: #1f2937; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #6b7280; font-size: 14px; text-align: center; margin-bottom: 28px; }
        form { display: flex; flex-direction: column; gap: 18px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; font-weight: 600; color: #4b5563; }
        input[type="text"], select { width: 100%; padding: 14px 16px; font-size: 15px; border: 1.5px solid #d1d5db; border-radius: 10px; background-color: #f9fafb; outline: none; }
        .location-box, .camera-box { background: #f0fdf4; border: 1px dashed #4CAF50; padding: 14px; border-radius: 10px; text-align: center; display: flex; flex-direction: column; gap: 8px; }
        .camera-box { background: #f0f9ff; border-color: #0284c7; }
        #photoPreview { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; margin: 0 auto; display: none; border: 3px solid #0284c7; }
        #selfieInput { display: none; }
        button, .btn-custom-label, .btn-view { font-size: 15px; font-weight: 600; padding: 14px; border: none; border-radius: 10px; cursor: pointer; width: 100%; text-align: center; display: block; text-decoration: none; }
        .btn-location { background-color: #4CAF50; color: white; }
        .btn-camera { background-color: #0284c7; color: white; }
        .btn-submit { background-color: #FF6C37; color: white; margin-top: 10px; }
        .btn-view { background-color: #374151; color: white; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Halaman Cover -->
        <div id="welcomeScreen">
            <!-- Tambahkan tag img di sini -->
            <img src="image_4cd6dd.png" alt="Logo Halo Suzuki" class="welcome-logo-img">
            
            <!-- Emoji lama disembunyikan -->
            <div class="welcome-emoji hidden">🚀</div> 
            
            <h2>Selamat Datang</h2>
            <p class="subtitle">Sistem Absensi Digital<br>After Sales BIT Jakarta</p>
            <button id="btnStart" class="btn-start">Mulai Absensi</button>
        </div>

        <!-- Form Utama (Disembunyikan Awalnya) -->
        <div id="mainForm" class="hidden">
            <h2>Sistem Absensi SERA BIT Jakarta</h2>
        <div class="subtitle"></div>
            
            <form id="contactForm">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Nama Lengkap" required>
                </div>
                <!-- ... (Input lainnya) ... -->
                <div class="form-group">
                    <label for="cabangAsal">Cabang Asal</label>
                    <select id="cabangAsal" required>
                        <option value="" disabled selected>-- Pilih Cabang Asal --</option>
                        <option value="BIT PG">BIT PG</option>
                        <option value="BIT BSD">BIT BSD</option>
                        <option value="BIT PIK">BIT PIK</option>
                        <option value="BIT DS">BIT DS</option>
                        <option value="BIT STR">BIT STR</option>
                        <option value="BIT HI">BIT HI</option>
                        <option value="BIT LCK">BIT LCK</option>
                        <option value="BIT GDS">BIT GDS</option>
                        <option value="BIT PURI">BIT PURI</option>
                        <option value="BIT SWG">BIT SWG</option>
                        <option value="BIT GWB">BIT GWB</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="lokasiSera">Lokasi Cabang SERA</label>
                    <select id="lokasiSera" required>
                        <option value="" disabled selected>-- Pilih Lokasi --</option>
                        <option value="SERA DS">SERA DS</option>
                        <option value="SERA PURI">SERA PURI</option>
                    </select>
                </div>
                
                <div class="location-box">
                    <button type="button" id="getLocationBtn" class="btn-location">📍 Ambil Lokasi Saat Ini</button>
                    <span id="locationStatus" style="font-size: 12px; color: #166534;">Lokasi belum diambil</span>
                </div>

                <div class="camera-box">
                    <img id="photoPreview" src="" alt="Preview Selfie">
                    <label for="selfieInput" class="btn-custom-label btn-camera">📸 Ambil Foto Selfie</label>
                    <input type="file" id="selfieInput" accept="image/*" capture="user" required>
                    <span id="cameraStatus" style="font-size: 12px; color: #0369a1;">Foto belum diambil</span>
                </div>
                
                <input type="hidden" id="lokasi" value="">
                <input type="hidden" id="fotoBase64" value="">

                <button type="submit" class="btn-submit">Kirim Data</button>
                <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vSGYOLLcStd0ddI4iaimv5O7zQ1ku1qbM3fVn_RoWuzdKhSzsFpdeqBF5KYapSrEd4cDSsxvDwGCf1P/pubhtml?gid=0&single=true" target="_blank" class="btn-view">📊 Lihat Data Absen</a>
            </form>
            <div class="footer-copyright" style="text-align: center; margin-top: 24px; font-size: 11px; color: #9ca3af; line-height: 1.6;">
            <div class="created-by" style="font-weight: 600; color: #6b7280;">Created By After Sales BIT</div>
            <div>© 2026 All Rights Reserved</div>
        </div>
    </div>

    <script>
        // Logika Pindah Halaman
        const btnStart = document.getElementById('btnStart');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const mainForm = document.getElementById('mainForm');

        btnStart.addEventListener('click', () => {
            welcomeScreen.classList.add('hidden');
            mainForm.classList.remove('hidden');
        });

        const locationBtn = document.getElementById('getLocationBtn');
        const locationStatus = document.getElementById('locationStatus');
        const lokasiInput = document.getElementById('lokasi');
        
        const selfieInput = document.getElementById('selfieInput');
        const cameraStatus = document.getElementById('cameraStatus');
        const fotoBase64Input = document.getElementById('fotoBase64');
        const photoPreview = document.getElementById('photoPreview');

        // Fungsi Geolocation
        locationBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                locationStatus.textContent = "Geolocation tidak didukung oleh browser kamu.";
                return;
            }
            locationStatus.textContent = "⏳ Mengambil lokasi...";
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                    
                    lokasiInput.value = mapsLink;
                    locationStatus.textContent = "✅ 📍 Lokasi berhasil didapatkan!";
                    locationBtn.textContent = "🔄 Perbarui Lokasi";
                },
                (error) => {
                    locationStatus.textContent = "❌ Gagal mengambil lokasi: " + error.message;
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });

 // Proses Konversi Gambar Kamera, Kompresi < 200KB & Preview
selfieInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        cameraStatus.textContent = "⏳ Memproses & mengompres foto...";
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                
                // 1. Tentukan maksimal resolusi (bisa disesuaikan)
                const MAX_WIDTH = 800;
                const MAX_HEIGHT = 800;
                let width = img.width;
                let height = img.height;
                
                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                
                // Gambar ulang image ke canvas dengan resolusi baru
                ctx.drawImage(img, 0, 0, width, height);
                
                // 2. Lakukan kompresi kualitas (mulai dari 0.7 atau 70%)
                let quality = 0.7;
                let compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                
                // 3. Loop mengecilkan kualitas jika file masih di atas 200 KB (~270000 karakter Base64)
                // (Ukuran karakter Base64 sekitar 33% lebih besar dari binary asli)
                while (compressedBase64.length * 0.75 > 200 * 1024 && quality > 0.1) {
                    quality -= 0.1;
                    compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                }
                
                // Simpan hasil kompresi ke input hidden dan tampilkan preview
                fotoBase64Input.value = compressedBase64;
                photoPreview.src = compressedBase64;
                photoPreview.style.display = "block";
                
                // Hitung estimasi ukuran akhir untuk log/status
                const finalSizeKb = Math.round((compressedBase64.length * 0.75) / 1024);
                cameraStatus.textContent = `✅ Foto berhasil dikunci! (~${finalSizeKb} KB)`;
            }
        }
        reader.readAsDataURL(file);
    }
});

        // Event Submit Form
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const namaValue = document.getElementById('nama').value.trim();
            const cabangAsalValue = document.getElementById('cabangAsal').value;
            const lokasiSeraValue = document.getElementById('lokasiSera').value;

            // 1. Validasi Required Nama
            if (!namaValue) {
                alert('⚠️ Kolom Nama Lengkap wajib diisi!');
                document.getElementById('nama').focus();
                return;
            }

            // 2. Validasi Required Cabang Asal
            if (!cabangAsalValue) {
                alert('⚠️ Silakan pilih Cabang Asal terlebih dahulu!');
                document.getElementById('cabangAsal').focus();
                return;
            }

            // 3. Validasi Required Lokasi SERA
            if (!lokasiSeraValue) {
                alert('⚠️ Silakan pilih Lokasi Cabang SERA terlebih dahulu!');
                document.getElementById('lokasiSera').focus();
                return;
            }

            // 4. Validasi Required Kunci Koordinat GPS Lokasi
            if (!lokasiInput.value) {
                alert('⚠️ Anda wajib klik tombol "Ambil Lokasi Saat Ini" sebelum mengirim data absen!');
                return;
            }

            // 5. Validasi Required Foto Selfie
            if (!fotoBase64Input.value) {
                alert('⚠️ Anda wajib mengambil "Foto Selfie" sebelum mengirim data absen!');
                return;
            }
            
            // Format waktu standar Indonesia
            const waktuSekarang = new Date().toLocaleString("id-ID", {
                timeZone: "Asia/Jakarta",
                dateStyle: "medium",
                timeStyle: "medium"
            });

            // Menyusun payload objek data untuk dikirim ke webhook
            const data = {
                nama: namaValue,
                cabang_asal: cabangAsalValue, 
                lokasi_sera: lokasiSeraValue, 
                lokasi_gps: lokasiInput.value,
                waktu: waktuSekarang,
                foto: fotoBase64Input.value
            };

            const webhookUrl = 'https://n8n-m1wtmfpb5ajg.n8x.biz.id/webhook/c89bbaf9-4406-4449-916b-93b6081e4e39'; 

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('🎉 Data absen berhasil dikirim!🎉 \nTerima kasih sudah melakukan absensi,\nSelamat Bertugas.');
                    document.getElementById('contactForm').reset();
                    photoPreview.style.display = "none";
                    locationStatus.textContent = "Lokasi belum diambil";
                    cameraStatus.textContent = "Foto selfie belum diambil";
                    locationBtn.textContent = "📍 Ambil Lokasi Saat Ini";
                } else {
                    alert('Server n8n merespons dengan error kode: ' + response.status);
                }
            } catch (error) {
                alert('Gagal mengirim data (Masalah Koneksi/CORS): ' + error.message);
            }
        });
    </script>
</body>
</html>
