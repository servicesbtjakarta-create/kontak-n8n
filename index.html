    <style>
        /* Base styles and CSS variables */
        :root {
            --primary: #FF6C37;
            --primary-gradient: linear-gradient(135deg, #FF7E40 0%, #FF5A26 100%);
            --secondary: #374151;
            --secondary-gradient: linear-gradient(135deg, #4b5563 0%, #1f2937 100%);
            --success: #10b981;
            --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --info: #0ea5e9;
            --info-gradient: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            --bg-light: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: rgba(255, 255, 255, 0.6);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f1f5f9;
            background-image: radial-gradient(at 0% 0%, rgba(255, 108, 55, 0.06) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.06) 0px, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Glassmorphism accent blobs */
        body::before {
            content: "";
            position: absolute;
            width: 320px;
            height: 320px;
            background: rgba(255, 108, 55, 0.08);
            border-radius: 50%;
            top: 15%;
            left: 10%;
            filter: blur(80px);
            z-index: -1;
        }

        body::after {
            content: "";
            position: absolute;
            width: 280px;
            height: 280px;
            background: rgba(2, 132, 199, 0.08);
            border-radius: 50%;
            bottom: 15%;
            right: 10%;
            filter: blur(80px);
            z-index: -1;
        }

        /* Container Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 440px;
            padding: 36px 28px;
            border-radius: 24px;
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-lg);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .card {
                padding: 28px 20px;
                border-radius: 20px;
            }
        }

        /* Section and Screen Transitions */
        .hidden {
            display: none !important;
        }

        .screen-transition {
            animation: fadeInScale 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(8px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Welcome Screen Styles */
        #welcomeScreen {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .welcome-logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-sm);
        }

        .welcome-logo-img {
            max-width: 100%;
            height: auto;
            max-height: 80px;
            object-fit: contain;
        }

        h2 {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .accent-text {
            color: var(--primary);
            font-weight: 600;
        }

        /* Buttons styling */
        button, .btn-custom-label, .btn-view {
            font-size: 15px;
            font-weight: 600;
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            text-align: center;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            user-select: none;
        }

        .btn-start {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 108, 55, 0.3);
            margin-top: 10px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 108, 55, 0.4);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        /* Form Styles */
        #mainForm h2 {
            margin-bottom: 4px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.3px;
            margin-left: 2px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            background-color: #f8fafc;
            outline: none;
            transition: all 0.2s ease;
            color: var(--text-dark);
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 108, 55, 0.1);
        }

        /* Custom boxes for Geo and Camera */
        .location-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 16px;
            border-radius: 14px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .location-box.success {
            background: #ecfdf5;
            border-color: #86efac;
        }

        .camera-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            padding: 16px;
            border-radius: 14px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .camera-box.success {
            background: #f0f9ff;
            border-color: #7dd3fc;
        }

        .btn-location {
            background: var(--success-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        }

        .btn-location:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.25);
        }

        .btn-location:active {
            transform: translateY(1px);
        }

        .btn-camera {
            background: var(--info-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.15);
            cursor: pointer;
        }

        .btn-camera:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.25);
        }

        .btn-camera:active {
            transform: translateY(1px);
        }

        #selfieInput {
            display: none;
        }

        #photoPreview {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto;
            display: none;
            border: 4px solid #ffffff;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12), 0 0 0 2px var(--info);
            animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .btn-submit {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 108, 55, 0.2);
            margin-top: 8px;
            font-size: 16px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 108, 55, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-view {
            background: var(--secondary-gradient);
            color: white;
            margin-top: 4px;
            box-shadow: 0 4px 12px rgba(55, 65, 81, 0.15);
        }

        .btn-view:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(55, 65, 81, 0.25);
        }

        .btn-view:active {
            transform: translateY(1px);

        /* Tom Select custom theme styling */
        .ts-wrapper.single .ts-control {
            padding: 14px 16px !important;
            border: 1.5px solid #e2e8f0 !important;
            border-radius: 12px !important;
            background-color: #f8fafc !important;
            font-size: 15px !important;
            font-family: 'Outfit', sans-serif !important;
            color: var(--text-dark) !important;
            transition: all 0.2s ease !important;
            box-shadow: none !important;
            display: flex;
            align-items: center;
        }

        .ts-wrapper.single.focus .ts-control {
            border-color: var(--primary) !important;
            background-color: #ffffff !important;
            box-shadow: 0 0 0 4px rgba(255, 108, 55, 0.1) !important;
        }

        .ts-wrapper.single .ts-control::after {
            border-color: #64748b transparent transparent transparent !important;
            border-width: 6px 5px 0 5px !important;
            right: 16px !important;
        }

        .ts-wrapper.single.input-active .ts-control::after {
            border-color: transparent transparent #64748b transparent !important;
            border-width: 0 5px 6px 5px !important;
        }

        .ts-dropdown {
            border-radius: 12px !important;
            border: 1px solid #e2e8f0 !important;
            margin-top: 6px !important;
            box-shadow: var(--shadow-lg) !important;
            padding: 6px !important;
            background: #ffffff !important;
            z-index: 1000 !important;
        }

        .ts-dropdown .option {
            padding: 11px 14px !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            font-size: 14px !important;
            transition: background 0.15s ease;
        }

        .ts-dropdown .option.active {
            background-color: rgba(255, 108, 55, 0.08) !important;
            color: var(--primary) !important;
            font-weight: 600 !important;

            line-height: 1.6;
        }

        .created-by {
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
        }

</head>

                locationStatus.style.color = "#dc2626";
                return;
            }
            locationStatus.textContent = "⏳ Mengambil lokasi...";
            locationStatus.style.color = "#475569";
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                    
                    lokasiInput.value = mapsLink;
                    locationStatus.textContent = "✅ Lokasi berhasil didapatkan!";
                    locationStatus.style.color = "#059669";
                    locationBox.classList.add('success');
                    locationBtn.innerHTML = `

        // Proses Konversi Gambar Kamera, Kompresi < 200KB & Preview
        selfieInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                cameraStatus.textContent = "⏳ Memproses & mengompres foto...";
                cameraStatus.style.color = "#475569";
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const img = new Image();
                    img.src = e.target.result;
                    
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let ctx = canvas.getContext('2d');
                        
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        let quality = 0.7;
                        let compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                        
                        while (compressedBase64.length * 0.75 > 200 * 1024 && quality > 0.1) {
                            quality -= 0.1;
                            compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                        }
                        
                        fotoBase64Input.value = compressedBase64;
                        photoPreview.src = compressedBase64;
                        photoPreview.style.display = "block";
                        
                        cameraStatus.textContent = `✅ Foto berhasil dikunci!`;
                        cameraStatus.style.color = "#0369a1";
                        cameraBox.classList.add('success');
                    }
                }
                reader.readAsDataURL(file);
            }
        });
