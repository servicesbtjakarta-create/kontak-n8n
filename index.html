<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Kontak n8n</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        form { display: flex; flex-direction: column; max-width: 300px; gap: 10px; }
        button { cursor: pointer; padding: 10px; border: none; }
        .btn-submit { background: #FF6C37; color: white; }
        .btn-location { background: #4CAF50; color: white; }
        #locationStatus { font-size: 12px; color: #555; font-style: italic; }
    </style>
</head>
<body>
    <h2>Data Absen SERA BIT Jakarta</h2>
    <form id="contactForm">
        <!-- Input Nama Lengkap -->
        <input type="text" id="nama" placeholder="Nama Lengkap" required>
        
        <!-- Pilihan Dropdown Cabang -->
        <select id="cabang" required>
            <option value="" disabled selected>-- Pilih Cabang --</option>
            <option value="BIT PG">BIT PG</option>
            <option value="BIT BSD">BIT BSD</option>
            <option value="BIT PIK">BIT PIK</option>
            <option value="BIT DS">BIT DS</option>
            <option value="BIT STR">BIT STR</option>
            <option value="BIT HI">BIT HI</option>
            <option value="BIT LCK">BIT LCK</option>
            <option value="BIT GDS">BIT GDS</option>
            <option value="BIT PURI">BIT PURI</option>
            <option value="BIT SWG">BIT SWG</option>
            <option value="BIT GWB">BIT GWB</option>
        </select>
        
        <!-- Tombol Geolocation -->
        <button type="button" id="getLocationBtn" class="btn-location">Ambil Lokasi Saat Ini</button>
        <span id="locationStatus">Lokasi belum diambil</span>
        
        <!-- Input Hidden untuk Menyimpan Link Google Maps -->
        <input type="hidden" id="lokasi" value="">

        <!-- Tombol Kirim -->
        <button type="submit" class="btn-submit">Kirim Data</button>
    </form>

    <script>
        const locationBtn = document.getElementById('getLocationBtn');
        const locationStatus = document.getElementById('locationStatus');
        const lokasiInput = document.getElementById('lokasi');
        const namaInput = document.getElementById('nama');
        const cabangInput = document.getElementById('cabang');

        // Fungsi untuk mengambil Geolocation Browser
        locationBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                locationStatus.textContent = "Geolocation tidak didukung oleh browser kamu.";
                return;
            }

            locationStatus.textContent = "Mengambil lokasi...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    
                    // Membuat format link Google Maps
                    const mapsLink = `https://google.com{latitude},${longitude}`;
                    
                    // Simpan link ke input hidden
                    lokasiInput.value = mapsLink;
                    locationStatus.textContent = "📍 Lokasi berhasil didapatkan!";
                    locationBtn.textContent = "Perbarui Lokasi";
                },
                (error) => {
                    locationStatus.textContent = "Gagal mengambil lokasi: " + error.message;
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });

        // Event Submit Form
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. VALIDASI NAMA (Cek apakah kosong atau hanya berisi spasi)
            if (!namaInput.value.trim()) {
                alert('⚠️ Nama Lengkap wajib diisi!');
                namaInput.focus();
                return;
            }

            // 2. VALIDASI CABANG (Cek apakah pengguna belum memilih cabang)
            if (!cabangInput.value) {
                alert('⚠️ Anda wajib memilih Cabang Terlebih dahulu!');
                cabangInput.focus();
                return;
            }
            
            // 3. VALIDASI LOKASI (Cek apakah tombol lokasi sudah diklik)
            if (!lokasiInput.value) {
                alert('⚠️ Anda wajib klik tombol "Ambil Lokasi Saat Ini" sebelum mengirim data absen!');
                return;
            }
            
            // Membuat format tanggal otomatis kirim
            const waktuSekarang = new Date().toLocaleString("id-ID", {
                timeZone: "Asia/Jakarta",
                dateStyle: "medium",
                timeStyle: "medium"
            });

            // Mengambil data form setelah lolos semua validasi
            const data = {
                nama: namaInput.value.trim(),
                cabang: cabangInput.value, 
                lokasi: lokasiInput.value,
                waktu: waktuSekarang
            };

            const webhookUrl = 'https://n8x.biz.id'; 

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('🎉 Data absen Anda berhasil dikirim!');
                    document.getElementById('contactForm').reset();
                    locationStatus.textContent = "Lokasi belum diambil";
                    locationBtn.textContent = "Ambil Lokasi Saat Ini";
                } else {
                    alert('Server n8n merespons dengan error kodes: ' + response.status);
                }
            } catch (error) {
                alert('Gagal mengirim data (Masalah Koneksi/CORS): ' + error.message);
            }
        });
    </script>
</body>
</html>
