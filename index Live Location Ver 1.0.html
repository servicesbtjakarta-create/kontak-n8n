<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Digital SERA BIT</title>
    <style>
        /* Pengaturan Dasar & Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Kartu Utama (Pas untuk Layar HP) */
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px; 
            padding: 30px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #1f2937;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            margin-bottom: 28px;
        }

        /* Struktur Form */
        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
        }

        /* Input dan Dropdown Custom */
        input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1.5px solid #d1d5db;
            border-radius: 10px;
            background-color: #f9fafb;
            color: #1f2937;
            outline: none;
            transition: all 0.2s ease;
            -webkit-appearance: none; /* Normalkan tampilan di iPhone/Safari */
        }

        input[type="text"]:focus, select:focus {
            border-color: #FF6C37;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 108, 55, 0.15);
        }

        /* Kotak Status Geolocation */
        .location-box {
            background: #f0fdf4;
            border: 1px dashed #4CAF50;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #locationStatus {
            font-size: 12px;
            color: #166534;
            font-weight: 500;
        }

        /* Desain Tombol */
        button {
            font-size: 15px;
            font-weight: 600;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-location {
            background-color: #4CAF50;
            color: white;
        }

        .btn-location:active {
            background-color: #3e8e41;
            transform: scale(0.98);
        }

        .btn-submit {
            background-color: #FF6C37;
            color: white;
            margin-top: 10px;
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(255, 108, 55, 0.2);
        }

        .btn-submit:active {
            background-color: #e05a2b;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Data Absen SERA BIT Jakarta</h2>
        <div class="subtitle">Sistem Absensi Digital Karyawan</div>
        
        <form id="contactForm">
            <!-- Input Nama -->
            <div class="form-group">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" placeholder="Nama Lengkap" required>
            </div>
            
            <!-- Dropdown Cabang -->
            <div class="form-group">
                <label for="cabang">Lokasi Cabang</label>
                <select id="cabang" required>
                    <option value="" disabled selected>-- Pilih Cabang --</option>
                    <option value="BIT PG">BIT PG</option>
                    <option value="BIT BSD">BIT BSD</option>
                    <option value="BIT PIK">BIT PIK</option>
                    <option value="BIT DS">BIT DS</option>
                    <option value="BIT STR">BIT STR</option>
                    <option value="BIT HI">BIT HI</option>
                    <option value="BIT LCK">BIT LCK</option>
                    <option value="BIT GDS">BIT GDS</option>
                    <option value="BIT PURI">BIT PURI</option>
                    <option value="BIT SWG">BIT SWG</option>
                    <option value="BIT GWB">BIT GWB</option>
                </select>
            </div>
            
            <!-- Tombol & Status Lokasi -->
            <div class="location-box">
                <button type="button" id="getLocationBtn" class="btn-location">📍 Ambil Lokasi Saat Ini</button>
                <span id="locationStatus">Lokasi belum diambil</span>
            </div>
            
            <!-- Input Hidden Koordinat Google Maps -->
            <input type="hidden" id="lokasi" value="">

            <!-- Tombol Kirim -->
            <button type="submit" class="btn-submit">Kirim Data</button>
        </form>
    </div>

    <script>
        const locationBtn = document.getElementById('getLocationBtn');
        const locationStatus = document.getElementById('locationStatus');
        const lokasiInput = document.getElementById('lokasi');

        // Fungsi untuk mengambil Geolocation Browser
        locationBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                locationStatus.textContent = "Geolocation tidak didukung oleh browser kamu.";
                return;
            }

            locationStatus.textContent = "⏳ Mengambil lokasi...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    
                    const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                    
                    lokasiInput.value = mapsLink;
                    locationStatus.textContent = "✅ 📍 Lokasi berhasil didapatkan!";
                    locationBtn.textContent = "🔄 Perbarui Lokasi";
                },
                (error) => {
                    locationStatus.textContent = "❌ Gagal mengambil lokasi: " + error.message;
                },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });

        // Event Submit Form dengan Validasi Berlapis (Strict Required)
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const namaValue = document.getElementById('nama').value.trim();
            const cabangValue = document.getElementById('cabang').value;

            // 1. Validasi Required Nama (Blokir Spasi Kosong)
            if (!namaValue) {
                alert('⚠️ Kolom Nama Lengkap wajib diisi dengan benar!');
                document.getElementById('nama').focus();
                return;
            }

            // 2. Validasi Required Pilihan Dropdown Cabang
            if (!cabangValue) {
                alert('⚠️ Silakan pilih Lokasi Cabang terlebih dahulu!');
                document.getElementById('cabang').focus();
                return;
            }

            // 3. Validasi Required Kunci Koordinat GPS Lokasi
            if (!lokasiInput.value) {
                alert('⚠️ Anda wajib klik tombol "Ambil Lokasi Saat Ini" sebelum mengirim data absen!');
                return;
            }
            
            // Format waktu standar Indonesia
            const waktuSekarang = new Date().toLocaleString("id-ID", {
                timeZone: "Asia/Jakarta",
                dateStyle: "medium",
                timeStyle: "medium"
            });

            const data = {
                nama: namaValue,
                cabang: cabangValue, 
                lokasi: lokasiInput.value,
                waktu: waktuSekarang
            };

            const webhookUrl = 'https://n8n-m1wtmfpb5ajg.n8x.biz.id/webhook/c89bbaf9-4406-4449-916b-93b6081e4e39'; 

            try {
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    alert('🎉 Data berhasil dikirim');
                    document.getElementById('contactForm').reset();
                    locationStatus.textContent = "Lokasi belum diambil";
                    locationBtn.textContent = "📍 Ambil Lokasi Saat Ini";
                } else {
                    alert('Server n8n merespons dengan error kodes: ' + response.status);
                }
            } catch (error) {
                alert('Gagal mengirim data (Masalah Koneksi/CORS): ' + error.message);
            }
        });
    </script>
</body>
</html>
